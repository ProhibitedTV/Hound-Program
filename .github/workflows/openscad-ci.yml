name: OpenSCAD Smoke Test

on:
  push:
    paths:
      - "mechanical/**/*.scad"
      - ".github/workflows/openscad-ci.yml"
      - "Makefile"
  pull_request:
    paths:
      - "mechanical/**/*.scad"
      - ".github/workflows/openscad-ci.yml"
      - "Makefile"
  workflow_dispatch:

jobs:
  openscad-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad

      - name: Export representative STLs
        run: |
          mkdir -p /tmp/hound-openscad-out
          openscad -q -o /tmp/hound-openscad-out/alpha_v01_assembly.stl -D 'PART="assembly"' mechanical/alpha_v0_1/hound_alpha_v0_1_assembly.scad
          openscad -q -o /tmp/hound-openscad-out/alpha_v02_assembly.stl -D 'PART="assembly"' mechanical/alpha_v0_2/hound_alpha_v0_2_assembly.scad
          openscad -q -o /tmp/hound-openscad-out/alpha_v03_assembly.stl -D 'PART="assembly"' mechanical/alpha_v0_3/hound_alpha_v0_3_assembly.scad
          openscad -q -o /tmp/hound-openscad-out/alpha_v03_leg_layout.stl -D 'PART="leg_layout"' mechanical/alpha_v0_3/hound_alpha_v0_3_assembly.scad
          openscad -q -o /tmp/hound-openscad-out/alpha_v04_panel_layout.stl -D 'PART="layout"' mechanical/alpha_v0_4/panel_split_test.scad
          openscad -q -o /tmp/hound-openscad-out/alpha_v04_leg_side.stl -D 'PART="assembly"' mechanical/alpha_v0_4/leg_side_test_module.scad
          openscad -q -o /tmp/hound-openscad-out/articulated_leg_front_left.stl -D 'PART="leg_front_left"' mechanical/legs/articulated_leg_v03.scad
          openscad -q -o /tmp/hound-openscad-out/exoshell_v02.stl -D 'PART="assembly"' mechanical/body/alpha_exoshell_v02.scad
          openscad -q -o /tmp/hound-openscad-out/alien_hoof_v02_core.stl -D 'PART="foot_core"' mechanical/feet/alien-hoof-type-a/hound_alien_hoof_v02.scad
          openscad -q -o /tmp/hound-openscad-out/alien_hoof_v02_coupon.stl -D 'PART="test_coupon"' mechanical/feet/alien-hoof-type-a/hound_alien_hoof_v02.scad
          openscad -q -o /tmp/hound-openscad-out/foot_interface_28mm.stl -D 'PART="adapter_plate"' mechanical/interfaces/foot_mount_m3_28mm.scad
          openscad -q -o /tmp/hound-openscad-out/hip_module.stl -D 'PART="module_body"' mechanical/joints/hip_module.scad
          openscad -q -o /tmp/hound-openscad-out/servo_mount.stl -D 'PART="servo_mount"' mechanical/mounts/servo_mount_standard.scad
          openscad -q -o /tmp/hound-openscad-out/tube_clamp_pair.stl -D 'PART="clamp_pair"' mechanical/mounts/tube_clamp.scad
          openscad -q -o /tmp/hound-openscad-out/spine_plate.stl -D 'PART="spine_plate"' mechanical/frame/alpha_spine_plate.scad
          openscad -q -o /tmp/hound-openscad-out/front_sensor_pod.stl -D 'PART="pod_shell"' mechanical/sensors/front_sensor_pod.scad
          openscad -q -o /tmp/hound-openscad-out/led_channel.stl -D 'PART="straight_channel"' mechanical/lighting/led_diffuser_modules.scad
          openscad -q -o /tmp/hound-openscad-out/audio_grille.stl -D 'PART="grille"' mechanical/audio/audio_grille_module.scad
          openscad -q -o /tmp/hound-openscad-out/cable_clip_6mm.stl -D 'PART="clip_6mm"' mechanical/cable_management/cable_clip_set.scad
          openscad -q -o /tmp/hound-openscad-out/controller_tray.stl -D 'PART="tray"' mechanical/electronics_mounts/controller_tray.scad
          openscad -q -o /tmp/hound-openscad-out/battery_sled.stl -D 'PART="sled"' mechanical/power/battery_sled.scad
          openscad -q -o /tmp/hound-openscad-out/armor_medium_panel.stl -D 'PART="medium_panel"' mechanical/armor/armor_plate_family.scad
          openscad -q -o /tmp/hound-openscad-out/bench_control_panel.stl -D 'PART="panel"' mechanical/safety/bench_control_panel_mount.scad
          openscad -q -o /tmp/hound-openscad-out/fastener_gauge.stl -D 'PART="gauge"' mechanical/test_fixtures/fastener_tolerance_gauge.scad
          openscad -q -o /tmp/hound-openscad-out/service_stand_left.stl -D 'PART="left_cradle"' mechanical/test_fixtures/alpha_service_stand.scad

      - name: Upload generated STL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openscad-smoke-test-stls
          path: /tmp/hound-openscad-out/*.stl
          if-no-files-found: error
